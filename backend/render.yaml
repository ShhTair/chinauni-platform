services:
  - type: web
    name: chinauni-api
    env: python
    buildCommand: "pip install -r requirements.txt && pip install uvicorn"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./chinauni.db
      - key: SECRET_KEY
        value: dev_secret_key_for_chinauni_sandbox_12345
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
